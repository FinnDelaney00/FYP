name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff

      - name: Lint Python files
        run: ruff check --select F,E9 smartstream-terraform/lambdas

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python test dependencies
        run: python -m pip install --upgrade pip pytest -r smartstream-terraform/layers/ml/requirements.txt

      - name: Run backend test suite
        run: python -m pytest

  terraform-checks:
    name: Terraform Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        working-directory: smartstream-terraform
        run: terraform fmt -check *.tf tests/*.tftest.hcl

      - name: Initialize Terraform
        working-directory: smartstream-terraform
        run: terraform init -backend=false

      - name: Validate Terraform
        working-directory: smartstream-terraform
        run: terraform validate

      - name: Run Terraform tests
        working-directory: smartstream-terraform
        run: terraform test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  monitor:
    name: Monitor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: monitor/package-lock.json

      - name: Install monitor dependencies
        working-directory: monitor
        run: npm ci

      - name: Run monitor tests
        working-directory: monitor
        run: npm test
